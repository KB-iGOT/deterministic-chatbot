# =============================================================================
# Saathi — Docker Compose (full local stack)
# =============================================================================
#
# Quick start:
#   cp .env.example .env          # fill in credentials
#   docker compose up             # Postgres + Redis + Saathi API
#
# With Langfuse observability:
#   docker compose --profile observability up
#
# Dev mode (hot-reload, no rebuild needed on code change):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
#
# Rebuild after dep changes:
#   docker compose build saathi
#
# Reset all data (WARNING: deletes DB volumes):
#   docker compose down -v
# =============================================================================

services:

  # ── PostgreSQL 16 + pgvector ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16-alpine
    container_name: saathi-postgres
    environment:
      POSTGRES_DB:       saathi
      POSTGRES_USER:     saathi
      POSTGRES_PASSWORD: saathi_local        # override in prod via secrets
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro   # creates langfuse db
    ports:
      - "5432:5432"                          # expose for local tools (DBeaver, psql)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saathi -d saathi"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saathi-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Saathi API ───────────────────────────────────────────────────────────────
  saathi:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: saathi-api
    env_file: .env
    environment:
      # Override connection strings to point at compose service names
      POSTGRES_URL: postgresql+asyncpg://saathi:saathi_local@postgres:5432/saathi
      REDIS_URL:    redis://redis:6379/3
      # Auto-run migrations on startup in compose (safe for dev/staging)
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    volumes:
      # Mount GCP service-account key if using Vertex AI / Cloud Translation
      # Uncomment and point to your key file:
      # - ./service-account.json:/secrets/sa.json:ro
      # And set in .env: GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa.json
      #
      # Mount flows for quick iteration without rebuild:
      # - ./flows:/app/flows:ro
      - ./flows:/app/flows:ro                # flow YAML hot-mount (no rebuild for YAML changes)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ── Langfuse (optional — enable with: --profile observability) ───────────────
  # Self-hosted FSM + LLM observability. Access at http://localhost:3001
  # Default credentials: admin@example.com / changeme (first-run setup)
  #
  # Usage:
  #   docker compose --profile observability up
  #   Then set in .env:
  #     LANGFUSE_HOST=http://localhost:3001
  #     LANGFUSE_PUBLIC_KEY=<from Langfuse UI>
  #     LANGFUSE_SECRET_KEY=<from Langfuse UI>
  langfuse:
    image: langfuse/langfuse:latest
    container_name: saathi-langfuse
    profiles: [observability]
    environment:
      DATABASE_URL:    postgresql://saathi:saathi_local@postgres:5432/langfuse
      NEXTAUTH_URL:    http://localhost:3001
      NEXTAUTH_SECRET: dev-langfuse-nextauth-secret-change-in-prod
      SALT:            dev-langfuse-salt-change-in-prod
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      TELEMETRY_ENABLED: "false"             # disable phone-home in dev
    ports:
      - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
